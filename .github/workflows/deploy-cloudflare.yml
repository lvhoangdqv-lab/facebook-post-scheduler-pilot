name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-save wrangler

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          validate_supabase_key() {
            local value="${SUPABASE_SERVICE_ROLE_KEY:-}"
            if [ -z "$value" ]; then
              echo "SUPABASE_SERVICE_ROLE_KEY is empty; keeping existing Worker secret if any."
              return 0
            fi
            if [[ "$value" == sb_publishable_* || "$value" == anon* ]]; then
              echo "::error::SUPABASE_SERVICE_ROLE_KEY looks like a publishable/anon key. Use the service_role JWT or sb_secret_* key."
              exit 1
            fi
            if [[ "$value" == sb_secret_* ]]; then
              echo "::error::This app uses Supabase REST/PostgREST and requires the legacy service_role JWT that starts with eyJ, not sb_secret_*."
              exit 1
            fi
            if [[ "$value" != eyJ* ]]; then
              echo "::error::SUPABASE_SERVICE_ROLE_KEY must be the legacy service_role JWT that starts with eyJ."
              exit 1
            fi
          }
          put_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name"
            fi
          }
          validate_supabase_key
          put_secret SUPABASE_URL
          put_secret SUPABASE_SERVICE_ROLE_KEY
          put_secret ADMIN_USERNAME
          put_secret ADMIN_PASSWORD_HASH
          put_secret SESSION_SECRET
          put_secret CRON_SECRET
          put_secret FB_PAGE_ID
          put_secret FB_PAGE_ACCESS_TOKEN

      - name: Redeploy with secrets available
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
