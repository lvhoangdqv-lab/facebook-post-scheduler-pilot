name = "facebook-post-scheduler-pilot"
main = "worker.mjs"
account_id = "91bd2edde501910ea030a9b494b3c4e4"
compatibility_date = "2026-05-11"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[triggers]
crons = ["*/5 * * * *"]

[vars]
STORAGE_DRIVER = "supabase"
FB_DRY_RUN = "true"
FB_GRAPH_VERSION = "v25.0"
SUPABASE_STORAGE_BUCKET = "post-images"
UPLOAD_MAX_BYTES = "5242880"
COOKIE_SAMESITE = "Lax"
